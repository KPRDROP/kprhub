name: Pelota Updater

on:
  schedule:
    - cron: '0 */1 * * *'
    
  workflow_dispatch:
  push:
    branches: [ main ]
    paths: 
      - 'pelota.py'

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install Playwright
      run: |
        pip install playwright
        playwright install chromium
        
    - name: Install Chrome and dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y wget xvfb unzip
        
        # Install Chrome
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        
        google-chrome --version
        
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install requests beautifulsoup4 GitPython selenium-wire==5.1.0 blinker==1.7.0 webdriver-manager
        
    - name: Configure git
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
    - name: Run playlist updater
      env:
        DISPLAY: :99
      run: |
        Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
        export DISPLAY=:99
        sleep 3
        
        python3 -c "from webdriver_manager.chrome import ChromeDriverManager; ChromeDriverManager().install()"
        
        python3 pelota.py
        
    - name: Commit and push (ALWAYS)
      run: |
        # Ensure latest base (avoid conflicts)
        git fetch origin main
        git reset --soft origin/main
        
        # Stage files (always)
        git add -A
        
        # ALWAYS create commit (even if no changes)
        git commit --allow-empty -m "Pelota auto-update - $(date -u '+%Y-%m-%d %H:%M UTC')"
        
        # Push safely (force-with-lease avoids overwriting others unexpectedly)
        git push origin main --force-with-lease
