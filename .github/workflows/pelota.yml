name: Roja Stream Updater

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          persist-credentials: true
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq --no-install-recommends \
            libasound2t64 \
            libgbm1 \
            libxkbcommon0 \
            libnspr4 \
            libnss3 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libatk-bridge2.0-0 \
            libatspi2.0-0 \
            libcups2 \
            libdrm2 \
            libx11-xcb1 \
            libxcb-dri3-0 \
            libxcb1 \
            libxfixes3 \
            libxshmfence1 \
            libwayland-client0 \
            libpango-1.0-0 \
            libcairo2 \
            libgdk-pixbuf2.0-0 \
            libgtk-3-0 \
            xvfb || true
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright gitpython requests beautifulsoup4
      
      - name: Install Playwright browsers
        run: |
          playwright install chromium
          playwright install-deps chromium || true
      
      - name: Run scraper
        run: |
          xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' python pelota.py
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Stage and push output files
        if: always()
        run: |
          # Configure git
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          # Set remote with token
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          
          # Stage the output files and caches
          git add eventos.m3u8 eventos_tivimate.m3u8 caches/ || true
          
          # Check if there are changes
          if git diff --staged --quiet && git diff --quiet; then
            echo "No changes to commit"
          else
            # Pull latest with rebase to avoid conflicts
            git pull origin ${{ github.ref_name }} --rebase --allow-unrelated-histories || true
            
            # Add again after pull in case of conflicts
            git add eventos.m3u8 eventos_tivimate.m3u8 caches/ || true
            
            # Commit and push
            git commit -m "Update streams $(date -u +'%Y-%m-%d %H:%M:%S UTC')" || echo "Nothing to commit"
            git push origin ${{ github.ref_name }} || echo "Push failed (may already be up to date)"
            echo "✓ Successfully pushed changes"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
