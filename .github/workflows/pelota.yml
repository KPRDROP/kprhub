name: Pelota Updater

on:
  schedule:
    - cron: '0 * * * *'
    
  workflow_dispatch:
  push:
    branches: [ main ]
    paths: 
      - 'pelota.py'

jobs:
  update-playlist:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        
    - name: Install Chrome and dependencies
      run: |
        # Install required packages
        sudo apt-get update
        sudo apt-get install -y wget xvfb unzip
        
        # Install Chrome
        wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
        sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        
        # Verify Chrome installation
        google-chrome --version
        
    - name: Install Python dependencies
      run: |
        pip install --upgrade pip
        pip install requests beautifulsoup4 GitPython selenium-wire==5.1.0 blinker==1.7.0 webdriver-manager
        
    - name: Configure git
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        
    - name: Run playlist updater
      env:
        DISPLAY: :99
      run: |
        # Start virtual display
        Xvfb :99 -screen 0 1920x1080x24 > /dev/null 2>&1 &
        export DISPLAY=:99
        sleep 3
        
        # Install ChromeDriver using webdriver-manager
        python3 -c "from webdriver_manager.chrome import ChromeDriverManager; ChromeDriverManager().install()"
        
        # Run the script
        python3 pelota.py
        
    - name: Commit and push changes
      run: |
        # Pull latest changes first to avoid conflicts
        git pull origin main --rebase || true
        
        # Stage the playlist files
        git add eventos.m3u eventos_tivimate.m3u playlist.m3u playlist_tivimate.m3u || true
        
        # Check if there are changes to commit
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          # Force commit even if there are no detected changes
          git commit -m "Pelota updater - $(date -u '+%Y-%m-%d %H:%M UTC')" || true
          git push origin main || git push --force origin main
        fi
        
    - name: Force push if needed
      if: failure()
      run: |
        # If previous step failed, force add and commit
        git add eventos.m3u eventos_tivimate.m3u playlist.m3u playlist_tivimate.m3u
        git commit -m "Pelota updater (forced) - $(date -u '+%Y-%m-%d %H:%M UTC')" || true
        git push origin main --force
